<text x="24.0" y="56.0" font-size="32" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">PDF has no DOM</text>
<text x="24.0" y="84.0" font-size="16" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">Chrome paints glyphs at VISUAL positions. Extraction rebuilds lines by row.</text>
<text x="24.0" y="104.0" font-size="16" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">So anything side-by-side at the same height is merged — measured, on two parser engines.</text>
<text x="44.0" y="180.0" font-size="18" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1971c2" opacity="1.00" xml:space="preserve">resume.html</text>
<text x="44.0" y="205.0" font-size="15" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">&lt;main&gt;  Experience</text>
<text x="44.0" y="223.8" font-size="15" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">&lt;aside&gt; Skills</text>
<text x="44.0" y="249.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">DOM order: main first</text>
<text x="414.0" y="178.0" font-size="16" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#9c36b5" opacity="1.00" xml:space="preserve">Chrome --print-to-pdf</text>
<text x="414.0" y="209.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">writes each glyph at an</text>
<text x="414.0" y="227.8" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">(x, y) on the page</text>
<text x="414.0" y="249.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">DOM order discarded here</text>
<text x="784.0" y="180.0" font-size="18" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#0c8599" opacity="1.00" xml:space="preserve">the PDF</text>
<text x="784.0" y="209.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">a bag of glyphs +</text>
<text x="784.0" y="227.8" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">coordinates. No tree.</text>
<text x="784.0" y="249.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">no structure survives</text>
<text x="1154.0" y="180.0" font-size="18" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#e8590c" opacity="1.00" xml:space="preserve">the parser</text>
<text x="1154.0" y="209.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">groups glyphs into lines</text>
<text x="1154.0" y="227.8" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">by their y position</text>
<text x="1154.0" y="249.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">same row = same line</text>
<text x="48.0" y="372.0" font-size="20" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">❌  a SIDEBAR — two sections side by side</text>
<text x="64.0" y="418.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">SKILLS</text>
<text x="64.0" y="435.5" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Python, Go,</text>
<text x="64.0" y="453.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Kubernetes</text>
<text x="260.0" y="418.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">EXPERIENCE</text>
<text x="260.0" y="435.5" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Senior Engineer, Acme</text>
<text x="260.0" y="453.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Cut p99 latency 43%</text>
<text x="560.0" y="473.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">same</text>
<text x="560.0" y="489.2" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">row</text>
<text x="48.0" y="536.0" font-size="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">the parser reads ONE line:</text>
<text x="60.0" y="574.0" font-size="16" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#e03131" opacity="1.00" xml:space="preserve">"Senior Engineer, Acme  Python, Go, Kubernetes"</text>
<text x="48.0" y="613.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">a sentence nobody wrote. A job title welded to a skills list.</text>
<text x="748.0" y="372.0" font-size="20" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#2f9e44" opacity="1.00" xml:space="preserve">✅  a RECORD beside its OWN dates</text>
<text x="764.0" y="418.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Senior Engineer, Acme</text>
<text x="764.0" y="435.5" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Cut p99 latency 43%</text>
<text x="1158.0" y="416.0" font-size="14" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Mar 2021 – Present</text>
<text x="748.0" y="536.0" font-size="14" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#868e96" opacity="1.00" xml:space="preserve">the parser reads ONE line:</text>
<text x="760.0" y="574.0" font-size="16" font-family="'Cascadia Code', Consolas, 'SF Mono', Menlo, monospace" fill="#2f9e44" opacity="1.00" xml:space="preserve">"Senior Engineer, Acme  Mar 2021 – Present"</text>
<text x="748.0" y="613.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#2f9e44" opacity="1.00" xml:space="preserve">merged too — but still TRUE. So the typography survives.</text>
<text x="48.0" y="702.0" font-size="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#e03131" opacity="1.00" xml:space="preserve">⚠  "Just put the important content first in the DOM" — the standard advice — does NOT work.</text>
<text x="48.0" y="729.0" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Measured: main-first in the DOM, sidebar moved left with CSS `order`. Extraction inverted anyway. The DOM is gone by print time.</text>
<text x="48.0" y="747.8" font-size="15" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1e1e1e" opacity="1.00" xml:space="preserve">Tables were the WORST of five layouts tested — not the safe choice everyone calls them.</text>
<text x="24.0" y="811.0" font-size="17" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1971c2" opacity="1.00" xml:space="preserve">So: single column. Not an aesthetic — a measurement. You don't trade beauty for parseability;</text>
<text x="24.0" y="832.2" font-size="17" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#1971c2" opacity="1.00" xml:space="preserve">you trade columns of unrelated content, which costs nothing.</text>
<text x="1356.0" y="473.0" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#2f9e44" opacity="1.00" xml:space="preserve">same</text>
<text x="1356.0" y="489.2" font-size="13" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#2f9e44" opacity="1.00" xml:space="preserve">row</text>
</svg>